        // Accumulator Pattern
        const nums = [1, 1, 3];
        let total = 0; //to store result

        for (let i = 0; i < nums.length; i++) { //loop tru the array
            const num = nums[i];
            total += num; //update result
        }
        console.log(total);

        const numsDoubled = [];

        for (let i = 0; i < nums.length; i++) {
            const num = nums[i];
            numsDoubled.push(num * 2);
        }
        console.log(numsDoubled);
