<!DOCTYPE html>
<html>
  <head>
    <title>DOM PROJECTS</title>

    <style>
        body {
            font-family: Arial;

        }


        .subscribe-button {
            border: none;
            background-color: #000;
            color: #fff;
            padding: 10px 15px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .is-subscribe {
            background-color: rgb(249, 249, 249);
            color: #000;
        }

        .cost-input {
            font-size: 15px;
            padding: 10px 10px;
        }

        .calculate-button {
            background-color: green;
            color: #fff;
            border: none;
            font-size: 15px;
            padding: 12px 15px;
            cursor: pointer;
            border-radius: 5px;
        }


    </style>




  </head>
  <body>

    <P>YouTube Subscribe Button</P>
    <button onclick="
    subscribe();
    " class="js-subscribe-button subscribe-button">
    Subscribe
    </button>

    <p>Amazon Shipping Calculator</p>

    <input placeholder="Cost of order" class="js-cost-input cost-input" 
    onkeydown="handlecostKeydown(event);">

    <button onclick="
        calculateTotal(); 
    " class="calculate-button">Calculate</button>

    <p class="js-total-cost"></p>



    <script>   

        function handlecostKeydown(event) {
            if (event.key === 'Enter') {
                calculateTotal();
            }
        }


        function calculateTotal() {
            const inputElement = document.querySelector
            ('.js-cost-input');
            let cost = Number(inputElement.value);
            // console.log(cost);
            // console.log(typeof cost);

            if (cost < 40) {
                cost = cost + 10;
                // console.log(cost);
            }

            document.querySelector('.js-total-cost')
            .innerHTML = `$${cost}`;
        }

        function subscribe() {
            const buttonElement = document.querySelector('.js-subscribe-button');

            if (buttonElement.innerText === 'Subscribe') {
                buttonElement.innerHTML = 'Subscribed';
                buttonElement.classList.add('is-subscribe');
            } else {
                buttonElement.innerHTML = 'Subscribe';
                buttonElement.classList.remove('is-subscribe');
            }
        }


    </script>
  </body>
</html>
